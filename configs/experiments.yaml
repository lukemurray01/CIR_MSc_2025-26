shared:
  master_seed: 120339106
  T: 1.0

methods:
  core:
    - FTE # Full truncation Euler
    - ProjEuler # Projected Euler
    - KL # Kelly Lord splitting
    - KLM # Backstopped adaptive
    - BLT # BLT splitting (exact Bessel flow + linear ODE; nonlinear noise)

  reference_only:
    - HH # Hefter-Herzwurm Milstein fine-grid strong reference

  terminal_only:
    - Exact # non chi squared distribtuion

time_grids:
  smoke:
    n_paths: 1000
    n_steps: 100

  figure:
    n_paths: 50000
    n_steps: 100

  weak_error:
    # 200k paths halves the Monte Carlo floor twice over vs the old 50k, so
    # the fit-refusal policy (|error| >= 2*MC-se) rescues the A-C points whose
    # weak bias sits just below the old noise floor.
    n_paths: 200000
    n_steps:
      - 4
      - 8
      - 16
      - 32
      - 64
      - 128
      - 256

  strong_error:
    n_paths: 20000
    coarse_n_steps:
      - 16
      - 32
      - 64
      - 128
      - 256
      - 512
    # Production figures use an eight-times finer HH reference (2^15) than the
    # earlier 2^12 exploratory default; use the reference_sensitivity block
    # below before treating fitted slopes as thesis evidence.
    #reference_n_steps: 16384
    reference_n_steps: 32768

experiments:
  exact_transition_figure:
    description: Five-regime exact terminal transition density figure.
    regimes:
      - A
      - B
      - C
      - D
      - E
    n_paths: 50000
    T: 1.0
    density_quantile: 0.999
    output: fig2_2_exact_transition.pdf

  fte_vs_exact_check:
    description: Quick FTE terminal-density check against exact law.
    regimes:
      - A
      - C
      - E
    n_paths: 10000
    n_steps: 100
    T: 1.0
    output: check_fte_vs_exact.pdf

  fte_moment_check:
    description: FTE terminal mean check in regimes A-C.
    regimes:
      - A 
      - B
      - C 
    n_paths: 10000
    n_steps: 200
    T: 1.0
    relative_tolerance: 0.05

  fte_all_regime_smoke:
    description: FTE positivity and moment check across all five regimes.
    regimes:
      - A
      - B
      - C
      - D
      - E
    n_paths: 1000
    n_steps: 100
    T: 1.0

  kl_uniform_smoke:
    description: Uniform Kelly-Lord positivity and moment  check in alpha >= 0 regimes.
    regimes:
      - A 
      - B
      - C 
    n_paths: 1000
    n_steps: 100
    T: 1.0

  kl_uniform_moment_check:
    description: Uniform Kelly-Lord terminal mean check in alpha >= 0 regimes.
    regimes:
      - A
      - B
      - C 
    n_paths: 10000
    n_steps: 200
    T: 1.0
    relative_tolerance: 0.05

  fte_self_convergence_diagnostic:
    description: Supplementary FTE fine-grid self-convergence diagnostic.
    regimes:
      - A
      - B
      - C
      - D
      - E
    n_paths: 20000
    coarse_n_steps:
      - 8
      - 16
      - 32
      - 64
      - 128
      - 256
    reference_n_steps: 16384
    T: 1.0
    output_csv: fte_self_convergence.csv
    output_figure: fte_self_convergence.pdf

  fte_weak_convergence_smoke:
    description: FTE terminal weak-error smoke experiment for g1-g3.
    regimes:
      - A
      - C
      - E
    payoffs:
      - g1
      - g2
      - g3
    n_paths: 10000
    n_steps:
      - 4
      - 8
      - 16
      - 32
      - 64
      - 128
      - 256
    T: 1.0
    output_csv: fte_weak_convergence_smoke.csv

  fte_zero_boundary_diagnostic:
    description: FTE zero-boundary and near-zero mass diagnostic.
    regimes:
      - A
      - C
      - E
    n_paths: 20000
    n_steps:
      - 4
      - 8
      - 16
      - 32
      - 64
      - 128
      - 256
    epsilons:
      - 1.0e-10
      - 1.0e-8
      - 1.0e-6
      - 1.0e-4
      - 1.0e-3
    T: 1.0
    output_csv: fte_zero_boundary_diagnostic.csv


klm_fig3_jax:
  quick:
    lambda_value: 0.05
    final_time: 1.0
    initial_y: 0.02

    n_paths: 64
    reference_power: 12
    n_paper_a_values: 5
    a_min: 0.04
    a_max: 1.6
    include_a0_diagnostic: true

    kappas: [2.0, 0.2]
    levels: [4, 5]
    rho: 64
    fine_steps_per_chunk: 1024
    a_batch_size: 5

    fixed_step_source: hmax
    fit_x_source: hmax
    plot_ef_y_diagnostic: false
    seed: 120339106

  full:
    lambda_value: 0.05
    final_time: 1.0
    initial_y: 0.02

    n_paths: 1000
    # The compact in-memory sweep is separate from the chunked KLM Fig. 3
    # paper reproduction.  Use reference_sensitivity below to compare
    # powers 14, 16, and 18 before quoting fitted orders.
    reference_power: 16
    n_paper_a_values: 40
    a_min: 0.04
    a_max: 1.6
    include_a0_diagnostic: true

    kappas: [2.0, 0.2]
    levels: [4, 5, 6, 7, 8, 9]
    rho: 64
    fine_steps_per_chunk: 16384
    a_batch_size: 40

    fixed_step_source: hmax
    fit_x_source: hmax
    plot_ef_y_diagnostic: false
    seed: 120339106

reference_sensitivity:
  strong_error:
    description: Same seed and plotted levels, varying HH reference resolution.
    # Gate paths must match the production benchmark (20000): the sensitivity
    # bars drawn on the order-vs-delta summary decorate 20000-path points, so
    # computing them at a tenth of the paths made the bars noisier than the
    # points. Regime B included so no summary point lacks its bar.
    # For references beyond 32768 (D/E convergence evidence) use the streamed
    # deep ladder: notebooks/kaggle/kaggle_reference_ladder_JAX.ipynb.
    n_paths: 20000
    regimes: [A, B, C, D, E]
    schemes: [FTE, ProjEuler, KL, KLM]
    coarse_n_steps: [16, 32, 64, 128, 256, 512]
    reference_n_steps: [4096, 16384, 32768]
    rho: 64

  klm_fig3_jax:
    description: Compact Fig. 3 fitted-order reference sensitivity.
    lambda_value: 0.05
    final_time: 1.0
    initial_y: 0.02
    n_paths: 256
    reference_powers: [14, 16, 18]
    n_paper_a_values: 8
    a_min: 0.04
    a_max: 1.6
    include_a0_diagnostic: true
    kappas: [2.0, 0.2]
    levels: [4, 5, 6, 7, 8, 9]
    rho: 64
    fine_steps_per_chunk: 16384
    a_batch_size: 8
    fixed_step_source: hmax
    fit_x_source: hmax
    plot_ef_y_diagnostic: false
    seed: 120339106
